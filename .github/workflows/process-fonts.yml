name: Process Fonts

on:
  repository_dispatch:
    types: [process-fonts]
  workflow_dispatch:  # 允许手动触发

jobs:
  process-fonts:
    runs-on: ubuntu-latest
    # 只需要读取权限，不再需要写入（不 push 代码）
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y woff2

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download update info
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: check-updates.yml
          name: update-info
          path: data/
          search_artifacts: true
          workflow_conclusion: success
        continue-on-error: true

      - name: Create update info if not exists
        run: |
          if [ ! -f data/updates.json ]; then
            echo "Creating empty updates file for manual run..."
            mkdir -p data
            echo '[]' > data/updates.json
          fi

      - name: Process fonts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_PACKAGE_NAME: ${{ vars.NPM_PACKAGE_NAME }}
        run: |
          python scripts/process_fonts.py \
            --config config/fonts.json \
            --ranges config/unicode_ranges.json \
            --updates data/updates.json \
            --output fonts \
            --versions data/versions.json

      - name: Generate font list
        run: |
          python scripts/generate_font_list.py \
            --fonts-dir fonts \
            --output fonts/index.json

      - name: Commit fonts versions
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add data/versions.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update fonts versions [skip ci]"

            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
          fi

      # ── npm 发布 ──────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Determine npm version
        id: npm_version
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")

          # 获取当前 npm 上已发布的版本，若未发布则从 0.0.0 开始
          CURRENT=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "0.0.0")
          echo "Current npm version: $CURRENT"

          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update package.json version
        run: |
          npm version ${{ steps.npm_version.outputs.version }} --no-git-tag-version

      - name: Publish to npm
        # run: npm publish --access public
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
